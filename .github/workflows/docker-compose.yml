version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: ErpInventoryApi.API/Dockerfile
    container_name: erp-inventory-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=erp_inventory;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=YOUR-SUPER-SECRET-JWT-KEY-CHANGE-IN-PRODUCTION-MIN-32-CHARS
      - JwtSettings__Issuer=ErpInventoryApi
      - JwtSettings__Audience=ErpInventoryApiClient
      - JwtSettings__ExpiryMinutes=60
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-network

  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_DB: erp_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp-network

volumes:
  postgres_data:
  redis_data:

networks:
  erp-network:
    driver: bridge
